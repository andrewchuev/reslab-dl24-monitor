name: release

# Push (or fast-forward) the `release` branch to the commit you want to ship
# to cut a new release: `git push origin main:release`. tauri-action reads the
# app version from tauri.conf.json (which points at package.json), builds
# installers for Windows/macOS/Linux, and creates or updates the matching
# GitHub Release directly - no pull request involved. Bump the version first
# with `npm version <patch|minor|major>` (also syncs src-tauri/Cargo.toml via
# scripts/sync-version.cjs) so each release gets its own tag.
on:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon (M1 and above)
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # Intel
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'Reslab DL24 Monitor v__VERSION__'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  publish-android:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      # Kept in sync with the NDK version installed locally
      # (see ANDROID_NDK_HOME on the maintainer's machine).
      NDK_VERSION: '30.0.14904198'
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: setup android sdk
        uses: android-actions/setup-android@v3

      - name: install android ndk
        run: sdkmanager --install "ndk;${{ env.NDK_VERSION }}"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm ci

      - name: decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      # No --split-per-abi: produces a single universal APK (bundling all
      # four architectures) that anyone can sideload directly from the
      # GitHub Release, matching how the desktop installers are distributed
      # - there's no per-ABI store listing to take advantage of a split here.
      - name: build android APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        # ANDROID_HOME comes from the setup-android step above as a plain
        # env var, not a workflow-expression one - computed here in the
        # shell rather than via `${{ env.ANDROID_HOME }}` so it resolves
        # correctly regardless of how that action exposes it. Both NDK_HOME
        # and ANDROID_NDK_HOME are set since the local dev machine this was
        # verified against only has NDK_HOME populated (ANDROID_NDK_HOME is
        # empty there) - setting both covers whichever the toolchain reads.
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}"
          export ANDROID_NDK_HOME="$NDK_HOME"
          npm run tauri android build -- --apk --ci

      - name: upload APK to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          apk=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -n1)
          if [ -z "$apk" ]; then
            echo "No APK found under build/outputs/apk" >&2
            exit 1
          fi
          echo "Uploading $apk to app-v$version"
          gh release upload "app-v$version" "$apk" --repo "${{ github.repository }}" --clobber
